

services:
  # 1. The Database (With AI Vector Support)
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: infotech-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist data even if container restarts

  # 2. The Python Brain
  ai-service:
    build: ./Python
    container_name: infotech-ai
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db
    env_file:
      - ./Python/.env

  # 3. The Spring Boot Body
  spring-app:
    build: ./SpringBackend
    container_name: infotech-backend
    ports:
      - "8082:8082"
    depends_on:
      - postgres-db
      - ai-service
    env_file:
      - ./SpringBackend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - PYTHON_SERVICE_URL=http://ai-service:8000

  # 4. The Frontend
  frontend:
    build: ./Frontend
    container_name: infotech-frontend
    ports:
      - "5173:80"
    depends_on:
      - spring-app

volumes:
  postgres_data: